name: CI / Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '10.32.1'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: './backend/pnpm-lock.yaml'

      - name: Install Backend Dependencies
        run: pnpm install
        working-directory: ./backend

      - name: Lint Backend
        run: pnpm check:ci
        working-directory: ./backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free up disk space
        run: |
          docker system prune -af --volumes

      - name: Build and Run Backend Unit Tests
        env:
          # JWT_SECRET_KEY has a safe Zod default; injecting from Secrets is
          # still best-practice so we never accidentally leak a real value.
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          # Build the unit-test Docker stage (TypeScript / NestJS + Vitest)
          docker compose -f docker-compose.test.yml --profile ci build backend-unit

          # Run Vitest unit tests – all external deps are mocked, no DB or LLM needed
          docker compose -f docker-compose.test.yml --profile ci run \
            -e JWT_SECRET_KEY \
            --rm backend-unit

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '10.32.1'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'

      - name: Install Frontend Dependencies
        run: pnpm install
        working-directory: ./frontend

      - name: Lint Frontend
        run: pnpm check:ci
        working-directory: ./frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free up disk space
        run: |
          docker system prune -af --volumes

      - name: Build and Run Frontend Component Tests
        run: |
          # Build frontend-component service with ci profile
          docker compose -f docker-compose.test.yml --profile ci build frontend-component
      
          # Run tests with ci profile
          docker compose -f docker-compose.test.yml --profile ci run --rm frontend-component
