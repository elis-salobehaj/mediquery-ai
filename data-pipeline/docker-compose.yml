services:
  transient-db:
    profiles:
      - legacy-transient-db
    image: postgres:18.3
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${PIPELINE_DB_USER}
      POSTGRES_PASSWORD: ${PIPELINE_DB_PASSWORD}
      POSTGRES_DB: ${PIPELINE_DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - pgdata_transient:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_transient:
