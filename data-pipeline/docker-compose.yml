services:
  transient-db:
    image: postgres:18.3-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${OMOP_ETL_USER}
      POSTGRES_PASSWORD: ${OMOP_ETL_PASSWORD}
      POSTGRES_DB: ${OMOP_DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${PIPELINE_DB_PORT:-5433}:5432"
    volumes:
      - pgdata_transient:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_transient:
