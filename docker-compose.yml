services:
  # PostgreSQL 18.3 Database (Token Tracking, Users, Chat, KPI Data)
  postgres:
    image: postgres:18.3-alpine
    container_name: mediquery-postgres
    restart: always
    env_file: .env
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB_NAME}
      - TENANTS_DB_NAME=${TENANTS_DB_NAME}
      - NEXUS_TENANT_DB_NAME=${NEXUS_TENANT_DB_NAME}
      - PIPELINE_DB_USER=${PIPELINE_DB_USER}
      - PIPELINE_DB_PASSWORD=${PIPELINE_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/01_init_multi_db.sh:ro
      - ./data-pipeline/gold_omop_tenant.sql:/seed/gold_omop_tenant.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Ollama service (local LLM) - Only starts when using local model
  ollama:
    profiles:
      - local-model # Only start with --profile local-model or when USE_LOCAL_MODEL=true
    build:
      context: .
      dockerfile: ollama.Dockerfile
    container_name: mediquery-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama_entrypoint.sh:/entrypoint.sh
    env_file: .env
    environment:
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # Uncomment for GPU support (NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # Database Migrator - Runs DB migrations before backend starts
  migrator:
    build:
      context: .
      dockerfile: migrator.Dockerfile
    container_name: mediquery-migrator
    env_file: .env
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=mediquery-postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - default

  # Backend service (TypeScript - Active)
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: mediquery-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file: .env
    environment:
      - NODE_ENV=development
      - PORT=8001
      - POSTGRES_HOST=mediquery-postgres
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "${VITE_API_URL:-http://localhost:8001}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - default

  # Frontend service (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Mediquery}
    container_name: mediquery-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    env_file: .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mediquery_data:
    driver: local
  ollama_data:
    driver: local

networks:
  default:
    name: mediquery-network
    driver: bridge
